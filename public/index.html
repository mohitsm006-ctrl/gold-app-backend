<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Drop Alert</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <div class="logo">
            <span class="gold-text">Au</span> Alert
        </div>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">
            <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </header>

    <main class="container">
        <div class="glass-card left-panel">
            <div class="price-header">
                <h2>Current Gold Price (24K - 1g - Chennai)</h2>
                <div class="price" id="currentPrice">₹ --,---</div>
            </div>
            
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="glass-card right-panel">
            <h2>Set Price Drop Alert</h2>
            <p class="subtitle">Get notified instantly when gold drops below your target price.</p>
            
            <form id="alertForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="targetPrice">Target Price (₹)</label>
                    <div class="price-input-wrapper">
                        <span class="currency-symbol">₹</span>
                        <input type="number" id="targetPrice" placeholder="e.g. 70000" min="1000" required>
                    </div>
                </div>

                <div class="message" id="formMessage"></div>

                <button type="submit" id="submitBtn" class="primary-btn">
                    <span id="btnText">Set Alert</span>
                    <div id="btnLoader" class="loader hidden"></div>
                </button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
